{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto mt-12 p-8 bg-white shadow-xl rounded-2xl">
  <h2 class="text-2xl font-bold mb-6 text-center text-[#88BDF2]">🔐 Login</h2>
  
  {% if form.errors %}
    <p class="text-red-500 text-center mb-4">Invalid login. Please try again.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-[#88BDF2] text-white py-2 px-4 rounded-lg w-full mt-4 hover:bg-[#71a7db]">
      Login
    </button>
  </form>
</div>
{% endblock %}
