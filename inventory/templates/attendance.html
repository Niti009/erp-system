{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-xl mx-auto mt-12 p-10 bg-white rounded-3xl shadow-xl border border-gray-200 text-center">
  <h2 class="text-3xl font-bold text-[#88BDF2] mb-6">🕒 Mark Attendance</h2>

  {% if message %}
    <p class="text-md text-green-600 font-semibold mb-4">{{ message }}</p>
  {% endif %}

  <p class="text-lg text-gray-700 mb-6">
    Status for today: 
    <span class="font-bold {% if today_status == 'Present' %}text-green-600{% else %}text-red-500{% endif %}">
      {{ today_status }}
    </span>
  </p>

  <form method="POST" class="flex flex-col sm:flex-row justify-center gap-4">
    {% csrf_token %}
    <button type="submit" name="action" value="checkin" class="bg-[#88BDF2] text-white font-bold px-6 py-3 rounded-full hover:bg-blue-500 transition">
      ⏰ Punch In
    </button>
    <button type="submit" name="action" value="checkout" class="bg-[#C1BFFF] text-white font-bold px-6 py-3 rounded-full hover:bg-purple-500 transition">
      🔚 Punch Out
    </button>
  </form>
</div>
{% endblock %}
