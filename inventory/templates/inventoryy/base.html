<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ERP System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f9faff] text-gray-800 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-[#88BDF2] to-[#C1BFFF] py-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-center space-x-3">
      <a href="{% url 'dashboard' %}" class="px-4 py-2 rounded-full shadow-md bg-white text-[#88BDF2] font-semibold hover:brightness-110 transition">Dashboard</a>
      <a href="{% url 'product_list' %}" class="px-4 py-2 rounded-full shadow-md bg-[#88BDF2] text-white font-semibold hover:brightness-110 transition">Products</a>
      <a href="{% url 'customer_list' %}" class="px-4 py-2 rounded-full shadow-md bg-[#C1BFFF] text-white font-semibold hover:brightness-110 transition">Customers</a>
      <a href="{% url 'apply_leave' %}" class="px-4 py-2 rounded-full shadow-md bg-[#88BDF2] text-white font-semibold hover:brightness-110 transition">Leave</a>
      <a href="{% url 'mark_attendance' %}" class="px-4 py-2 rounded-full shadow-md bg-[#C1BFFF] text-white font-semibold hover:brightness-110 transition">Attendance</a>
      <a href="{% url 'upload_file' %}" class="px-4 py-2 rounded-full shadow-md bg-[#88BDF2] text-white font-semibold hover:brightness-110 transition">Upload</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="px-6 py-10">
    {% block content %}
    {% endblock %}
  </main>

</body>
</html>
