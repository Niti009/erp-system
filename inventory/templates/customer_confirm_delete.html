{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto mt-20 p-10 bg-white rounded-3xl shadow-lg border border-gray-200 text-center">
  <h2 class="text-3xl font-bold text-[#C1BFFF] mb-6">⚠️ Delete Customer</h2>
  <p class="text-gray-600 mb-8 text-lg">
    Are you sure you want to delete <strong>{{ customer.name }}</strong>?
  </p>

  <form method="post" class="flex justify-center gap-6">
    {% csrf_token %}
    <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-200">
      Yes, Delete
    </button>
    <a href="{% url 'customer_list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-6 rounded-lg transition duration-200">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
