{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-xl mx-auto mt-16 p-10 bg-white rounded-3xl shadow-xl border border-gray-200 text-center">
  <h2 class="text-2xl font-bold text-[#88BDF2] mb-6">⚠️ Confirm Deletion</h2>
  
  <p class="text-lg text-gray-700 mb-8">
    Are you sure you want to delete the product <span class="font-semibold text-red-500">"{{ product.name }}"</span>?
  </p>

  <form method="POST" class="flex justify-center gap-4">
    {% csrf_token %}
    <button type="submit" class="bg-red-500 text-white font-semibold px-6 py-2 rounded-full hover:bg-red-600 transition">
      🗑️ Yes, Delete
    </button>
    <a href="{% url 'product_list' %}" class="bg-gray-300 text-gray-800 font-semibold px-6 py-2 rounded-full hover:bg-gray-400 transition">
      ❌ Cancel
    </a>
  </form>
</div>
{% endblock %}
